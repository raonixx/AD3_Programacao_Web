<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logoTitulo">
            <img src="img/Logo_IFC_horizontal.png" alt="Instituto Federal Catarinense" class="logo">
            <h1>Gestão Acadêmica</h1>
        </div>
        <nav>
            <ul>
                <li><a href="cursos.html">Cadastro de Cursos</a></li>
                <li><a href="professores.html">Cadastro de Professores</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <button id="addProfessor">Adicionar Professor</button>
        <table id="professoresTable">
            <thead>
                <tr>
                    <th>Nome do Professor</th>
                    <th>E-mail</th>
                    <th>Sala</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </main>
    <!-- Modal para Adicionar/Editar Professor -->
    <div id="professorModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Adicionar/Editar Professor</h2>
            <form id="professorForm">
                <input type="hidden" id="codigoProfessor" name="codigoProfessor" required>
                <label for="nomeProfessor">Nome do Professor:</label>
                <input type="text" id="nomeProfessor" name="nomeProfessor" required>
                <label for="emailProfessor">E-mail:</label>
                <input type="email" id="emailProfessor" name="emailProfessor" required>
                <label for="sala">Sala:</label>
                <input type="text" id="sala" name="sala" required>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>
    <script src="professores.js"></script>
</body>

</html>
